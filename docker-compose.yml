services:
  postgres:
    image: postgres:16
    container_name: inspection_postgres
    restart: always
    environment:
      POSTGRES_DB: inspection_platform
      POSTGRES_USER: inspection_user
      POSTGRES_PASSWORD: inspection_password
    ports:
      - "5432:5432"
    volumes:
      - inspection_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: inspection_redis
    restart: always
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.25
    container_name: inspection_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx:/etc/nginx/conf.d
    depends_on:
      - postgres
      - redis

volumes:
  inspection_postgres_data: